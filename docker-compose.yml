version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: phone-book-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: p@ssw0rd
      POSTGRES_DB: contactsdb
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d contactsdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: phone-book-backend
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=contactsdb;Username=user;Password=p@ssw0rd
      - GeminiApiKey=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: phone-book-frontend
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api/contacts
    depends_on:
      - backend

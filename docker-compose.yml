version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: phone-book-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: p@ssw0rd
      POSTGRES_DB: contactsdb
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d contactsdb" ]
      interval: 5s
      timeout: 5s
      retries: 5
